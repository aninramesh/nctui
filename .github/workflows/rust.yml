name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Build
      run: cargo build --verbose
    - name: Run tests
      run: cargo test --verbose

  static-check:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Install Rust toolchain with musl target
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: x86_64-unknown-linux-musl
    - name: Install musl tools
      run: sudo apt-get update && sudo apt-get install -y musl-tools
    - name: Build static binary (x86_64-musl)
      run: cargo build --release --target x86_64-unknown-linux-musl
    - name: Verify static linking
      run: |
        file target/x86_64-unknown-linux-musl/release/nctui
        file target/x86_64-unknown-linux-musl/release/nctui | grep -q "statically linked"
